services:
  spunto-lite:
    build: .
    container_name: spunto-lite
    restart: unless-stopped
    ports:
      # Port 80 gives clean worker URLs (http://worker-<id>.localhost) with no :port.
      - "80:80"
    volumes:
      # Talk to the host Docker daemon — workers are sibling containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the user's SSH keys read-only; injected into workers for git push.
      - ${HOME}/.ssh:/host-ssh:ro
      # Persist the SQLite DB.
      - spunto-lite-data:/app/data
    environment:
      BASE_DOMAIN: localhost
      DATA_DIR: /app/data
      HOST_SSH_DIR: /host-ssh
      PORT: 80
      # Set a strong value to protect stored secrets. Defaults to an insecure dev key.
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-spunto-lite-dev-insecure-key}
      # Optional headless/CI fallback for private GCP Artifact Registry / GCR base
      # images. Prefer configuring this in the UI (Settings → Container registry),
      # which stores it encrypted in the DB; the UI value wins over this env var.
      GCP_SA_KEY: ${GCP_SA_KEY:-}

  # Navigateur pilotable pour tester l'UI de bout en bout (humain ou agent
  # Claude via le serveur MCP `mcp/server.js`, voir `.mcp.json` + `mcp/README.md`).
  # Sur le réseau compose par défaut : il atteint l'app à `http://spunto-lite`.
  # Lancé À LA DEMANDE (image ~1,4 Go, pas au boot) via le profil `browser` :
  #   docker compose --profile browser up -d --build
  browser-remote:
    image: ghcr.io/spuntodotnet/browser-remote:latest
    restart: unless-stopped
    profiles:
      - browser
      - test
    ports:
      # Publié pour que le serveur MCP (côté hôte/worker) l'atteigne en localhost.
      - "3005:3000"
    environment:
      ACTIVATE_STEALTH_PLUGIN: "true"

  # E2E runner (Playwright) on the compose network, so both its Node `request` fixture and the
  # CDP-driven browser reach the app at the same URL (http://spunto-lite). Runs the browser
  # suite against browser-remote's shared Chrome over CDP — no bundled Playwright browsers.
  # Launched on demand:  docker compose --profile test run --rm e2e
  # (add `--project=api` / `--project=browser` to scope). Requires the `browser-remote` service,
  # which `--profile test` also brings up.
  e2e:
    image: node:24-bookworm-slim
    profiles:
      - test
    working_dir: /work/e2e
    depends_on:
      - spunto-lite
      - browser-remote
    volumes:
      - ./:/work
    environment:
      E2E_BASE_URL: http://spunto-lite
      CDP_ENDPOINT: http://browser-remote:3000
      CI: "true"
    # `npm ci` then run the suite. The browser project connects over CDP; the api project is
    # pure HTTP — neither downloads a browser.
    command: sh -c "npm ci && npx playwright test"

volumes:
  spunto-lite-data:
