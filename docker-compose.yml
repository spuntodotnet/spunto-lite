services:
  spunto-lite:
    build: .
    container_name: spunto-lite
    restart: unless-stopped
    ports:
      # Port 80 gives clean worker URLs (http://worker-<id>.localhost) with no :port.
      - "80:80"
    volumes:
      # Talk to the host Docker daemon — workers are sibling containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the user's SSH keys read-only; injected into workers for git push.
      - ${HOME}/.ssh:/host-ssh:ro
      # Persist the SQLite DB.
      - spunto-lite-data:/app/data
    environment:
      BASE_DOMAIN: localhost
      DATA_DIR: /app/data
      HOST_SSH_DIR: /host-ssh
      PORT: 80
      # Set a strong value to protect stored secrets. Defaults to an insecure dev key.
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-spunto-lite-dev-insecure-key}
      # Optional: GCP service-account key (roles/artifactregistry.reader) to pull
      # private Artifact Registry / GCR base images. Raw JSON or base64-encoded JSON.
      GCP_SA_KEY: ${GCP_SA_KEY:-}

  # Navigateur pilotable pour tester l'UI de bout en bout (humain ou agent
  # Claude via le serveur MCP `mcp/server.js`, voir `.mcp.json` + `mcp/README.md`).
  # Sur le réseau compose par défaut : il atteint l'app à `http://spunto-lite`.
  # Lancé À LA DEMANDE (image ~1,4 Go, pas au boot) via le profil `browser` :
  #   docker compose --profile browser up -d --build
  browser-remote:
    image: ghcr.io/spuntodotnet/browser-remote:latest
    restart: unless-stopped
    profiles:
      - browser
    ports:
      # Publié pour que le serveur MCP (côté hôte/worker) l'atteigne en localhost.
      - "3005:3000"
    environment:
      ACTIVATE_STEALTH_PLUGIN: "true"

volumes:
  spunto-lite-data:
